<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Chart Live</title>
    <style>
        body {
            margin: 0;
            background: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif;
        }
    .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
    .header {
            padding: 12px 20px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    .symbol {
            font-size: 20px;
            font-weight: 600;
        }
    .price-info {
            text-align: right;
        }
    .price {
            font-size: 24px;
            font-weight: 700;
        }
    .change {
            font-size: 14px;
            margin-top: 2px;
        }
    .green { color: #26a69a; }
    .red { color: #ef5350; }
      #chart {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="symbol">BTC/USDT · 1m</div>
            <div class="price-info">
                <div class="price green" id="price">66,234.50</div>
                <div class="change green" id="change">+0.00 (+0.00%)</div>
            </div>
        <div id="chart"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        // Esperamos a que cargue la librería
        window.addEventListener('load', function() {
            const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: {
                    background: { color: '#131722' },
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { color: '#1e222d' },
                    horzLines: { color: '#1e222d' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#2a2e39',
                },
                timeScale: {
                    borderColor: '#2a2e39',
                    timeVisible: true,
                    secondsVisible: false,
                },
            });

            const candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderDownColor: '#ef5350',
                borderUpColor: '#26a69a',
                wickDownColor: '#ef5350',
                wickUpColor: '#26a69a',
            });

            // Datos iniciales
            let lastClose = 66234.50;
            let baseTime = Math.floor(Date.now() / 1000) - 100 * 60;
            let data = [];

            for (let i = 0; i < 100; i++) {
                let open = lastClose;
                let volatility = (Math.random() - 0.5) * 400;
                let close = open + volatility;
                let high = Math.max(open, close) + Math.random() * 150;
                let low = Math.min(open, close) - Math.random() * 150;

                data.push({
                    time: baseTime + i * 60,
                    open: open,
                    high: high,
                    low: low,
                    close: close,
                });
                lastClose = close;
            }

            candleSeries.setData(data);

            // Actualizar en tiempo real - sube y baja
            setInterval(() => {
                let lastData = data[data.length - 1];
                let newTime = lastData.time + 60;
                let open = lastData.close;

                let change = (Math.random() - 0.48) * 300;
                let close = open + change;
                let high = Math.max(open, close) + Math.random() * 100;
                let low = Math.min(open, close) - Math.random() * 100;

                let newCandle = { time: newTime, open, high, low, close };
                data.push(newCandle);
                candleSeries.update(newCandle);

                // Actualizar precio header
                let totalChange = close - data[0].open;
                let percentChange = (totalChange / data[0].open * 100);
                let isUp = totalChange >= 0;

                document.getElementById('price').textContent = close.toLocaleString('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
                document.getElementById('price').className = 'price ' + (isUp? 'green' : 'red');

                document.getElementById('change').textContent =
                    (totalChange >= 0? '+' : '') + totalChange.toFixed(2) +
                    ' (' + (percentChange >= 0? '+' : '') + percentChange.toFixed(2) + '%)';
                document.getElementById('change').className = 'change ' + (isUp? 'green' : 'red');

            }, 1000);

            chart.timeScale().fitContent();
        });
    </script>
</body>
  </html>
