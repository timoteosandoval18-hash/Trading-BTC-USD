<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
     .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
     .header {
            padding: 12px 20px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
     .symbol {
            font-size: 20px;
            font-weight: 600;
        }
     .price-info {
            text-align: right;
        }
     .price {
            font-size: 24px;
            font-weight: 700;
        }
     .change {
            font-size: 14px;
            margin-top: 2px;
        }
     .green { color: #26a69a; }
     .red { color: #ef5350; }
      .chart-wrapper {
            flex: 1;
            padding: 10px;
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="symbol">BTC/USDT · 1m</div>
            <div class="price-info">
                <div class="price green" id="price">66,234.50</div>
                <div class="change green" id="change">+0.00 (+0.00%)</div>
            </div>
        <div class="chart-wrapper">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('chart');
        let lastClose = 66234.50;
        let startPrice = lastClose;
        let data = [];
        let labels = [];

        // Generar datos iniciales
        for (let i = 0; i < 50; i++) {
            let open = lastClose;
            let change = (Math.random() - 0.48) * 300;
            let close = open + change;
            let high = Math.max(open, close) + Math.random() * 150;
            let low = Math.min(open, close) - Math.random() * 150;
            
            data.push({
                x: Date.now() - (50 - i) * 60000,
                o: open,
                h: high,
                l: low,
                c: close
            });
            lastClose = close;
        }

        const chart = new Chart(ctx, {
            type: 'candlestick',
            data: {
                datasets: [{
                    label: 'BTC/USDT',
                    data: data,
                    color: {
                        up: '#26a69a',
                        down: '#ef5350',
                        unchanged: '#26a69a',
                    },
                    borderColor: {
                        up: '#26a69a',
                        down: '#ef5350',
                        unchanged: '#26a69a',
                    }
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1e222d',
                        titleColor: '#d1d4dc',
                        bodyColor: '#d1d4dc',
                        borderColor: '#2a2e39',
                        borderWidth: 1
                    }
                },
                scales: {
                    x: {
                        type: 'time',
                        time: {
                            unit: 'minute',
                            displayFormats: {
                                minute: 'HH:mm'
                            }
                        },
                        ticks: { color: '#8b949e' },
                        grid: { color: '#1e222d' }
                    },
                    y: {
                        position: 'right',
                        ticks: { 
                            color: '#8b949e',
                            callback: function(value) { return '$' + value.toLocaleString(); }
                        },
                        grid: { color: '#1e222d' }
                    }
                },
                animation: false
            }
        });

        // Actualizar cada segundo
        setInterval(() => {
            let lastCandle = data[data.length - 1];
            let open = lastCandle.c;
            let change = (Math.random() - 0.48) * 300;
            let close = open + change;
            let high = Math.max(open, close) + Math.random() * 100;
            let low = Math.min(open, close) - Math.random() * 100;

            let newCandle = {
                x: Date.now(),
                o: open,
                h: high,
                l: low,
                c: close
            };

            data.push(newCandle);
            if (data.length > 60) data.shift();

            chart.update('none');

            // Actualizar header
            let totalChange = close - startPrice;
            let percentChange = (totalChange / startPrice * 100);
            let isUp = totalChange >= 0;

            document.getElementById('price').textContent = close.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            document.getElementById('price').className = 'price ' + (isUp? 'green' : 'red');

            document.getElementById('change').textContent =
                (totalChange >= 0? '+' : '') + totalChange.toFixed(2) +
                ' (' + (percentChange >= 0? '+' : '') + percentChange.toFixed(2) + '%)';
            document.getElementById('change').className = 'change ' + (isUp? 'green' : 'red');

        }, 1000);
    </script>
</body>
    </html>
